name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Build (smoke)
        env:
          PUBLIC_SITE_URL: https://uni-ia-workshop.vercel.app
          PUBLIC_CHECKOUT_URL: https://wa.me/5531999999999?text=Quero%20vaga
          PUBLIC_WHATSAPP_NUMBER: "+5531999999999"
          PUBLIC_LOTE_ATIVO: "1"
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        env:
          PUBLIC_SITE_URL: https://uni-ia-workshop.vercel.app
          PUBLIC_CHECKOUT_URL: https://wa.me/5531999999999?text=Quero%20vaga
          PUBLIC_WHATSAPP_NUMBER: "+5531999999999"
          PUBLIC_LOTE_ATIVO: "1"
        run: npm run test:e2e -- --project=desktop

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
